<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GEO Validation Dashboard</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #1d2430;
      --muted: #647084;
      --line: #d9dee8;
      --accent: #0f766e;
      --accent-soft: #dff5f1;
      --warn: #a15c07;
      --warn-soft: #fff4d7;
      --bad: #b42318;
      --bad-soft: #ffe4df;
      --ok: #267947;
      --ok-soft: #e5f7ea;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, "Microsoft YaHei", sans-serif;
      line-height: 1.5;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 20px 24px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 22px;
      letter-spacing: 0;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .metrics {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }

    .metric {
      min-height: 118px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .metric-value {
      display: flex;
      align-items: baseline;
      gap: 6px;
      font-size: 30px;
      font-weight: 700;
    }

    .metric-value span {
      color: var(--muted);
      font-size: 14px;
      font-weight: 400;
    }

    .progress {
      margin-top: 12px;
      height: 10px;
      overflow: hidden;
      background: #edf0f5;
      border-radius: 999px;
    }

    .bar {
      height: 100%;
      width: 0;
      background: var(--accent);
      transition: width 160ms ease;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .status.bad { background: var(--bad-soft); color: var(--bad); }
    .status.warn { background: var(--warn-soft); color: var(--warn); }
    .status.ok { background: var(--ok-soft); color: var(--ok); }

    .uploader {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input[type="file"] {
      width: 100%;
      padding: 10px;
      background: #fbfcfe;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 13px;
    }

    th, td {
      padding: 9px 8px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-weight: 700;
      background: #fbfcfe;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      margin: 8px 0 0;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: white;
    }

    .empty {
      color: var(--muted);
      padding: 20px 0 4px;
    }

    @media (max-width: 820px) {
      main { padding: 16px; }
      .metrics, .uploader { grid-template-columns: 1fr; }
      table { font-size: 12px; }
      th, td { padding: 8px 6px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>GEO 真实验证状态</h1>
    <p class="sub">导入 CSV 后查看真实证据完成度；示例行、占位行、未发送外联不会计入。</p>
  </header>

  <main class="grid">
    <section class="grid metrics" id="metrics"></section>

    <section class="panel">
      <h2 class="section-title">导入数据</h2>
      <p class="hint">选择仓库里的 CSV 文件。可以只导入一部分，未导入的项目会按 0 计算。</p>
      <div class="uploader">
        <div>
          <label for="replyLog">outreach_reply_log.csv</label>
          <input id="replyLog" type="file" accept=".csv,text/csv">
        </div>
        <div>
          <label for="interviews">interview_tracker.csv</label>
          <input id="interviews" type="file" accept=".csv,text/csv">
        </div>
        <div>
          <label for="answers">answer_runs.csv</label>
          <input id="answers" type="file" accept=".csv,text/csv">
        </div>
        <div>
          <label for="feedback">report_feedback.csv</label>
          <input id="feedback" type="file" accept=".csv,text/csv">
        </div>
      </div>
      <div class="actions">
        <button class="primary" id="loadDemo">使用当前示例状态</button>
        <button id="reset">清空</button>
      </div>
    </section>

    <section class="panel">
      <h2 class="section-title">完成门槛</h2>
      <table>
        <thead>
          <tr>
            <th>项目</th>
            <th>当前真实数</th>
            <th>目标</th>
            <th>状态</th>
            <th>下一步</th>
          </tr>
        </thead>
        <tbody id="gateRows"></tbody>
      </table>
    </section>

    <section class="panel">
      <h2 class="section-title">可疑或未计入记录</h2>
      <div id="excluded" class="empty">暂无导入数据。</div>
    </section>
  </main>

  <script>
    const targets = {
      replies: { label: "外联有效回复", target: 5, next: "发出 L014/L017/L015 并记录真实回复" },
      interviews: { label: "服务商有效访谈", target: 5, next: "把回复转成 20 分钟访谈并记录原话" },
      answers: { label: "真实 AI 回答记录", target: 60, next: "拿到真实门店后跑 20 prompts x 3 AI 入口" },
      feedback: { label: "真实报告反馈", target: 2, next: "生成真实报告后给服务商看" },
      reports: { label: "真实门店报告", target: 1, next: "基于真实 answer_runs 生成报告" },
      decision: { label: "最终 Go/No-Go 修订", target: 1, next: "完成真实证据后更新 00/15/29" }
    };

    const state = {
      replies: [],
      interviews: [],
      answers: [],
      feedback: []
    };

    const excluded = [];

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let quoted = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        const next = text[i + 1];
        if (ch === '"' && quoted && next === '"') {
          cell += '"';
          i++;
        } else if (ch === '"') {
          quoted = !quoted;
        } else if (ch === "," && !quoted) {
          row.push(cell);
          cell = "";
        } else if ((ch === "\n" || ch === "\r") && !quoted) {
          if (ch === "\r" && next === "\n") i++;
          row.push(cell);
          if (row.some(Boolean)) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += ch;
        }
      }
      row.push(cell);
      if (row.some(Boolean)) rows.push(row);
      if (!rows.length) return [];
      const headers = rows.shift().map(h => h.trim());
      return rows.map(values => Object.fromEntries(headers.map((h, idx) => [h, (values[idx] || "").trim()])));
    }

    function hasExampleText(record) {
      return Object.values(record).some(value => /示例|占位|粘贴原始回答|待补真实证据/.test(String(value || "")));
    }

    function isRealReply(record) {
      if (hasExampleText(record)) return false;
      if (!record.reply_id || !record.lead_id) return false;
      if (["", "未回复", "待确认"].includes(record.reply_status)) return false;
      return Boolean(record.reply_summary || record.raw_quote_or_screenshot_path || record.objection);
    }

    function isRealInterview(record) {
      if (hasExampleText(record)) return false;
      if (!record.interview_id || !record.company) return false;
      if (["示例姓名", ""].includes(record.name)) return false;
      return Boolean(record.key_quotes && record.signal_grade);
    }

    function isRealAnswer(record) {
      if (hasExampleText(record)) return false;
      if (!record.run_id || !record.prompt_id || !record.store_id) return false;
      if (!record.raw_answer || !record.question_text) return false;
      return Boolean(record.screenshot_path || record.raw_answer.length > 20);
    }

    function isRealFeedback(record) {
      if (hasExampleText(record)) return false;
      if (!record.feedback_id || !record.service_provider) return false;
      return Boolean(record.key_quotes && record.signal_grade);
    }

    function collectExcluded(type, records, predicate) {
      records.forEach((record, index) => {
        if (!predicate(record)) {
          const id = record.reply_id || record.interview_id || record.run_id || record.feedback_id || `row_${index + 1}`;
          excluded.push({ type, id, reason: "示例、占位、未回复或缺少可追溯证据" });
        }
      });
    }

    function counts() {
      excluded.length = 0;
      collectExcluded("外联回复", state.replies, isRealReply);
      collectExcluded("访谈", state.interviews, isRealInterview);
      collectExcluded("AI 回答", state.answers, isRealAnswer);
      collectExcluded("报告反馈", state.feedback, isRealFeedback);
      return {
        replies: state.replies.filter(isRealReply).length,
        interviews: state.interviews.filter(isRealInterview).length,
        answers: state.answers.filter(isRealAnswer).length,
        feedback: state.feedback.filter(isRealFeedback).length,
        reports: 0,
        decision: 0
      };
    }

    function statusClass(value, target) {
      if (value >= target) return "ok";
      if (value > 0) return "warn";
      return "bad";
    }

    function statusText(value, target) {
      if (value >= target) return "已达标";
      if (value > 0) return "进行中";
      return "未开始";
    }

    function render() {
      const c = counts();
      const metrics = document.getElementById("metrics");
      metrics.innerHTML = Object.entries(targets).map(([key, item]) => {
        const value = c[key] || 0;
        const pct = Math.min(100, Math.round((value / item.target) * 100));
        const cls = statusClass(value, item.target);
        return `
          <div class="panel metric">
            <div class="metric-label">${item.label}</div>
            <div class="metric-value">${value}<span>/ ${item.target}</span></div>
            <div class="progress"><div class="bar" style="width:${pct}%"></div></div>
            <p class="hint"><span class="status ${cls}">${statusText(value, item.target)}</span></p>
          </div>
        `;
      }).join("");

      document.getElementById("gateRows").innerHTML = Object.entries(targets).map(([key, item]) => {
        const value = c[key] || 0;
        const cls = statusClass(value, item.target);
        return `
          <tr>
            <td>${item.label}</td>
            <td>${value}</td>
            <td>${item.target}</td>
            <td><span class="status ${cls}">${statusText(value, item.target)}</span></td>
            <td>${item.next}</td>
          </tr>
        `;
      }).join("");

      const excludedBox = document.getElementById("excluded");
      if (!excluded.length) {
        excludedBox.className = "empty";
        excludedBox.innerHTML = "没有发现被排除的记录。";
      } else {
        excludedBox.className = "";
        excludedBox.innerHTML = `
          <table>
            <thead><tr><th>类型</th><th>ID</th><th>未计入原因</th></tr></thead>
            <tbody>
              ${excluded.map(item => `<tr><td>${item.type}</td><td>${item.id}</td><td>${item.reason}</td></tr>`).join("")}
            </tbody>
          </table>
        `;
      }
    }

    async function loadFile(input, key) {
      const file = input.files && input.files[0];
      if (!file) return;
      const text = await file.text();
      state[key] = parseCsv(text);
      render();
    }

    document.getElementById("replyLog").addEventListener("change", e => loadFile(e.target, "replies"));
    document.getElementById("interviews").addEventListener("change", e => loadFile(e.target, "interviews"));
    document.getElementById("answers").addEventListener("change", e => loadFile(e.target, "answers"));
    document.getElementById("feedback").addEventListener("change", e => loadFile(e.target, "feedback"));

    document.getElementById("loadDemo").addEventListener("click", () => {
      state.replies = [];
      state.interviews = [{ interview_id: "I001", name: "示例姓名", company: "示例公司", key_quotes: "记录原话", signal_grade: "B" }];
      state.answers = [{ run_id: "R001", prompt_id: "P001", store_id: "S001", question_text: "示例问题", raw_answer: "粘贴原始回答" }];
      state.feedback = [{ feedback_id: "RF001", service_provider: "示例服务商", key_quotes: "", signal_grade: "" }];
      render();
    });

    document.getElementById("reset").addEventListener("click", () => {
      state.replies = [];
      state.interviews = [];
      state.answers = [];
      state.feedback = [];
      document.querySelectorAll("input[type=file]").forEach(input => { input.value = ""; });
      render();
    });

    render();
  </script>
</body>
</html>
