<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>门店 Prompt Builder</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --panel: #ffffff;
      --ink: #17202c;
      --muted: #667085;
      --line: #d9e1ec;
      --teal: #0f766e;
      --blue: #2563eb;
      --amber: #b45309;
      --rose: #be123c;
      --green: #15803d;
      --soft-teal: #e6f4f2;
      --soft-blue: #eaf0ff;
      --soft-amber: #fff4df;
      --soft-rose: #ffe8ee;
      --shadow: 0 16px 36px rgba(23, 32, 44, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      line-height: 1.45;
    }

    button, input, select, textarea {
      font: inherit;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
    }

    .sidebar {
      background: #111827;
      color: #f8fafc;
      padding: 22px;
      display: grid;
      align-content: start;
      gap: 18px;
    }

    .brand {
      display: grid;
      gap: 6px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.14);
    }

    .brand h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }

    .brand p {
      margin: 0;
      color: #a9b7c8;
      font-size: 13px;
    }

    .form {
      display: grid;
      gap: 13px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      color: #a9b7c8;
      font-size: 12px;
    }

    input, select, textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      padding: 10px 11px;
    }

    textarea {
      min-height: 74px;
      resize: vertical;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding-top: 4px;
    }

    .btn {
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--ink);
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      min-height: 42px;
    }

    .btn.primary {
      background: var(--teal);
      border-color: var(--teal);
      color: #ffffff;
    }

    .main {
      min-width: 0;
      padding: 22px;
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .topbar {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      box-shadow: var(--shadow);
    }

    .topbar h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }

    .sub {
      color: var(--muted);
      font-size: 13px;
      margin: 4px 0 0;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
      display: grid;
      gap: 6px;
    }

    .metric strong {
      font-size: 24px;
      line-height: 1;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .panel h3 {
      margin: 0;
      font-size: 17px;
      letter-spacing: 0;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--line);
      background: #ffffff;
      border-radius: 8px;
      padding: 7px 9px;
      font-size: 12px;
      cursor: pointer;
    }

    .chip.active {
      background: var(--soft-teal);
      color: var(--teal);
      border-color: #b7ddd8;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    table {
      width: 100%;
      min-width: 920px;
      border-collapse: collapse;
      background: #fff;
    }

    th, td {
      text-align: left;
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      font-size: 13px;
    }

    th {
      background: #f8fafc;
      color: #536073;
      font-weight: 700;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .tag {
      display: inline-flex;
      min-height: 24px;
      align-items: center;
      padding: 3px 8px;
      border-radius: 8px;
      font-size: 12px;
      white-space: nowrap;
      background: #eef2f6;
      color: #354153;
    }

    .tag.high {
      background: var(--soft-rose);
      color: var(--rose);
    }

    .tag.mid {
      background: var(--soft-amber);
      color: var(--amber);
    }

    .tag.blue {
      background: var(--soft-blue);
      color: var(--blue);
    }

    .tag.green {
      background: #e8f6ed;
      color: var(--green);
    }

    .toast {
      min-height: 22px;
      color: #b7c4d6;
      font-size: 12px;
    }

    @media (max-width: 980px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        padding: 16px;
      }

      .main {
        padding: 14px;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: flex-start;
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .controls, .metrics {
        grid-template-columns: 1fr;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <h1>Prompt Builder</h1>
        <p>门店 AI 可见性测试</p>
      </div>

      <div class="form">
        <div class="field">
          <label for="storeName">门店名</label>
          <input id="storeName" value="晴川日料 Bistro">
        </div>

        <div class="field">
          <label for="city">城市</label>
          <input id="city" value="杭州">
        </div>

        <div class="field">
          <label for="area">商圈</label>
          <input id="area" value="湖滨">
        </div>

        <div class="field">
          <label for="industry">行业</label>
          <select id="industry">
            <option>餐饮</option>
            <option>丽人</option>
            <option>酒旅</option>
          </select>
        </div>

        <div class="field">
          <label for="category">品类</label>
          <input id="category" value="日料">
        </div>

        <div class="field">
          <label for="price">价格带</label>
          <input id="price" value="180-260">
        </div>

        <div class="field">
          <label for="competitors">竞品</label>
          <textarea id="competitors">山岚割烹
月见和牛寿喜烧
青木酒场</textarea>
        </div>

        <div class="field">
          <label for="extraScenario">补充场景</label>
          <input id="extraScenario" value="纪念日">
        </div>

        <div class="controls">
          <button class="btn primary" id="generate">生成</button>
          <button class="btn" id="reset">重置</button>
        </div>
        <div class="toast" id="toast"></div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="title">晴川日料 Bistro · 杭州湖滨</h2>
          <p class="sub" id="subtitle">餐饮 · 日料 · 16 个测试问题</p>
        </div>
        <div class="actions">
          <button class="btn" id="copyText">复制问题</button>
          <button class="btn" id="copyCsv">复制 CSV</button>
          <button class="btn primary" id="downloadCsv">下载 CSV</button>
        </div>
      </header>

      <section class="metrics" aria-label="统计">
        <div class="metric">
          <strong id="countTotal">16</strong>
          <span>问题数</span>
        </div>
        <div class="metric">
          <strong id="countHigh">8</strong>
          <span>高优先级</span>
        </div>
        <div class="metric">
          <strong id="countScenarios">7</strong>
          <span>场景数</span>
        </div>
        <div class="metric">
          <strong id="countCompetitors">3</strong>
          <span>竞品数</span>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>场景筛选</h3>
          <span class="tag blue" id="filterState">全部</span>
        </div>
        <div class="chips" id="chips"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>测试问题</h3>
          <span class="tag green" id="generatedAt">已生成</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>场景</th>
                <th>意图</th>
                <th>优先级</th>
                <th>Prompt</th>
                <th>备注</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script>
    const templates = [
      { industry: "餐饮", scenario: "约会", intent: "品类推荐", priority: "高", text: "{city}{area}附近适合约会的{category}推荐，环境好一点，人均{price}左右。", notes: "不要直接写目标门店名" },
      { industry: "餐饮", scenario: "生日", intent: "场景推荐", priority: "高", text: "{city}适合过生日的{category}店，有仪式感，最好能提前预约。", notes: "观察是否出现竞品" },
      { industry: "餐饮", scenario: "朋友聚餐", intent: "场景推荐", priority: "中", text: "{city}{area}适合朋友聚餐的{category}，不要太吵，人均{price}左右。", notes: "场景泛化测试" },
      { industry: "餐饮", scenario: "游客打卡", intent: "场景推荐", priority: "中", text: "{city}游客逛{area}后适合去哪家{category}吃饭？", notes: "本地旅游场景" },
      { industry: "餐饮", scenario: "团购", intent: "交易推荐", priority: "高", text: "{city}{area}抖音上有团购、适合两个人吃的{category}推荐。", notes: "测试抖音团购是否进入回答" },
      { industry: "餐饮", scenario: "性价比", intent: "交易推荐", priority: "中", text: "{city}{area}人均{price}左右、性价比高的{category}有哪些？", notes: "价格带测试" },
      { industry: "餐饮", scenario: "包间", intent: "信息确认", priority: "中", text: "{city}{area}适合小型聚会、有包间或安静座位的{category}推荐。", notes: "服务设施" },
      { industry: "餐饮", scenario: "品牌词", intent: "品牌确认", priority: "高", text: "{store}适合约会吗？人均大概多少？", notes: "允许写目标门店名" },
      { industry: "餐饮", scenario: "对比", intent: "竞品对比", priority: "高", text: "{store}和{competitor}哪个更适合生日聚餐？", notes: "每个竞品生成一条" },
      { industry: "餐饮", scenario: "信息准确", intent: "信息确认", priority: "高", text: "{store}营业时间、地址、人均和特色是什么？", notes: "错误信息测试" },
      { industry: "餐饮", scenario: "补充场景", intent: "场景推荐", priority: "中", text: "{city}{area}适合{extra}的{category}推荐，最好有抖音团购。", notes: "自定义场景" },

      { industry: "丽人", scenario: "美甲", intent: "品类推荐", priority: "高", text: "{city}{area}附近评价好的美甲店推荐，价格不要太贵。", notes: "行业扩展" },
      { industry: "丽人", scenario: "约会前", intent: "场景推荐", priority: "高", text: "{city}{area}适合约会前做造型或美甲的店推荐。", notes: "场景消费" },
      { industry: "丽人", scenario: "团购", intent: "交易推荐", priority: "中", text: "{city}{area}抖音上有团购的美甲美睫店有哪些？", notes: "抖音团购" },
      { industry: "丽人", scenario: "品牌词", intent: "品牌确认", priority: "高", text: "{store}价格、地址和主打服务是什么？", notes: "信息准确测试" },
      { industry: "丽人", scenario: "对比", intent: "竞品对比", priority: "高", text: "{store}和{competitor}哪个更适合约会前做美甲？", notes: "每个竞品生成一条" },
      { industry: "丽人", scenario: "补充场景", intent: "场景推荐", priority: "中", text: "{city}{area}适合{extra}的丽人店推荐，最好能预约。", notes: "自定义场景" },

      { industry: "酒旅", scenario: "亲子", intent: "场景推荐", priority: "高", text: "{city}适合周末亲子住一晚的酒店或民宿推荐。", notes: "行业扩展" },
      { industry: "酒旅", scenario: "游客", intent: "场景推荐", priority: "高", text: "第一次去{city}玩，住在{area}附近有什么酒店推荐？", notes: "游客场景" },
      { industry: "酒旅", scenario: "套餐", intent: "交易推荐", priority: "中", text: "{city}{area}抖音上有套餐或优惠的酒店推荐。", notes: "抖音套餐" },
      { industry: "酒旅", scenario: "品牌词", intent: "品牌确认", priority: "高", text: "{store}适合亲子出行吗？位置和价格大概怎么样？", notes: "品牌确认" },
      { industry: "酒旅", scenario: "对比", intent: "竞品对比", priority: "高", text: "{store}和{competitor}哪个更适合周末亲子住一晚？", notes: "每个竞品生成一条" },
      { industry: "酒旅", scenario: "补充场景", intent: "场景推荐", priority: "中", text: "{city}{area}适合{extra}的酒店或民宿推荐。", notes: "自定义场景" }
    ];

    let currentRows = [];
    let currentScenario = "全部";

    const $ = (id) => document.getElementById(id);

    function getCompetitors() {
      return $("competitors").value
        .split(/\r?\n|,|，|;/)
        .map((item) => item.trim())
        .filter(Boolean);
    }

    function fillTemplate(text, competitor = "") {
      const data = {
        store: $("storeName").value.trim(),
        city: $("city").value.trim(),
        area: $("area").value.trim(),
        category: $("category").value.trim(),
        price: $("price").value.trim(),
        competitor,
        extra: $("extraScenario").value.trim()
      };

      return text
        .replaceAll("{store}", data.store)
        .replaceAll("{city}", data.city)
        .replaceAll("{area}", data.area)
        .replaceAll("{category}", data.category)
        .replaceAll("{price}", data.price)
        .replaceAll("{competitor}", data.competitor)
        .replaceAll("{extra}", data.extra);
    }

    function buildRows() {
      const industry = $("industry").value;
      const competitors = getCompetitors();
      const rows = [];

      templates.filter((item) => item.industry === industry).forEach((item) => {
        if (item.intent === "竞品对比") {
          competitors.forEach((competitor) => {
            rows.push({
              ...item,
              prompt: fillTemplate(item.text, competitor),
              competitor
            });
          });
        } else {
          rows.push({
            ...item,
            prompt: fillTemplate(item.text)
          });
        }
      });

      return rows.map((row, index) => ({
        id: `GEO-${String(index + 1).padStart(3, "0")}`,
        ...row
      }));
    }

    function priorityTag(priority) {
      return priority === "高" ? "high" : "mid";
    }

    function render() {
      currentRows = buildRows();
      const shown = currentScenario === "全部"
        ? currentRows
        : currentRows.filter((row) => row.scenario === currentScenario);

      $("title").textContent = `${$("storeName").value.trim()} · ${$("city").value.trim()}${$("area").value.trim()}`;
      $("subtitle").textContent = `${$("industry").value} · ${$("category").value.trim()} · ${currentRows.length} 个测试问题`;
      $("countTotal").textContent = currentRows.length;
      $("countHigh").textContent = currentRows.filter((row) => row.priority === "高").length;
      $("countScenarios").textContent = new Set(currentRows.map((row) => row.scenario)).size;
      $("countCompetitors").textContent = getCompetitors().length;
      $("filterState").textContent = currentScenario;

      const scenarios = ["全部", ...Array.from(new Set(currentRows.map((row) => row.scenario)))];
      $("chips").innerHTML = scenarios.map((scenario) => (
        `<button class="chip ${scenario === currentScenario ? "active" : ""}" data-scenario="${escapeHtml(scenario)}">${escapeHtml(scenario)}</button>`
      )).join("");

      $("rows").innerHTML = shown.map((row) => `
        <tr>
          <td>${escapeHtml(row.id)}</td>
          <td><span class="tag blue">${escapeHtml(row.scenario)}</span></td>
          <td>${escapeHtml(row.intent)}</td>
          <td><span class="tag ${priorityTag(row.priority)}">${escapeHtml(row.priority)}</span></td>
          <td>${escapeHtml(row.prompt)}</td>
          <td>${escapeHtml(row.notes)}</td>
        </tr>
      `).join("");

      $("generatedAt").textContent = new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function toCsv() {
      const header = ["prompt_id", "industry", "city", "business_area", "scenario", "intent", "priority", "prompt", "notes"];
      const body = currentRows.map((row) => [
        row.id,
        row.industry,
        $("city").value.trim(),
        $("area").value.trim(),
        row.scenario,
        row.intent,
        row.priority,
        row.prompt,
        row.notes
      ]);
      return [header, ...body].map((line) => line.map(csvCell).join(",")).join("\n");
    }

    function csvCell(value) {
      const text = String(value ?? "");
      return `"${text.replaceAll('"', '""')}"`;
    }

    async function copyText(text, message) {
      await navigator.clipboard.writeText(text);
      $("toast").textContent = message;
    }

    $("generate").addEventListener("click", () => {
      currentScenario = "全部";
      render();
      $("toast").textContent = "已生成";
    });

    $("reset").addEventListener("click", () => {
      $("storeName").value = "晴川日料 Bistro";
      $("city").value = "杭州";
      $("area").value = "湖滨";
      $("industry").value = "餐饮";
      $("category").value = "日料";
      $("price").value = "180-260";
      $("competitors").value = "山岚割烹\n月见和牛寿喜烧\n青木酒场";
      $("extraScenario").value = "纪念日";
      currentScenario = "全部";
      render();
      $("toast").textContent = "已重置";
    });

    $("copyText").addEventListener("click", () => {
      copyText(currentRows.map((row) => `${row.id} ${row.prompt}`).join("\n"), "已复制问题");
    });

    $("copyCsv").addEventListener("click", () => {
      copyText(toCsv(), "已复制 CSV");
    });

    $("downloadCsv").addEventListener("click", () => {
      const blob = new Blob([toCsv()], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "geo_prompts.csv";
      link.click();
      URL.revokeObjectURL(url);
      $("toast").textContent = "已下载";
    });

    $("chips").addEventListener("click", (event) => {
      const target = event.target.closest("[data-scenario]");
      if (!target) return;
      currentScenario = target.dataset.scenario;
      render();
    });

    ["storeName", "city", "area", "industry", "category", "price", "competitors", "extraScenario"].forEach((id) => {
      $(id).addEventListener("input", render);
      $(id).addEventListener("change", render);
    });

    render();
  </script>
</body>
</html>
